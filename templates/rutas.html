<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Rutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Sistema Logístico</a>
    </div>
</nav>

<div class="container mt-4">

    <h1>Listado de Rutas</h1>

    <a href="/" class="btn btn-secondary mb-3">
        Volver al Dashboard
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-primary">

            <tr>
                <th>ID Ruta</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Prioridad</th>
            </tr>

        </thead>

        <tbody>

            {% for ruta in rutas %}

            <tr>
                <td>{{ ruta.ruta_id }}</td>
                <td>{{ ruta.fecha }}</td>
                <td>{{ ruta.estado }}</td>
                <td>{{ ruta.prioridad }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
