<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Vehículo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Sistema Logístico</a>

        <div class="navbar-nav">
            <a class="nav-link text-white" href="/">Dashboard</a>
            <a class="nav-link text-white" href="/rutas">Rutas</a>
            <a class="nav-link text-white" href="/vehiculos">Vehículos</a>
            <a class="nav-link text-white" href="/clientes">Clientes</a>
            <a class="nav-link text-white" href="/conductores">Conductores</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Agregar Vehículo</h1>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">ID Vehículo</label>
            <input type="text" name="vehiculo_id" class="form-control" placeholder="V006" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Placa</label>
            <input type="text" name="placa" class="form-control" placeholder="L123456" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" name="marca" class="form-control" placeholder="Toyota" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input type="text" name="modelo" class="form-control" placeholder="Hilux" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo</label>
            <input type="text" name="tipo" class="form-control" placeholder="Camioneta" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Capacidad KG</label>
            <input type="number" name="capacidad_kg" class="form-control" placeholder="1500" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select name="estado" class="form-control" required>
                <option value="Disponible">Disponible</option>
                <option value="En Ruta">En Ruta</option>
                <option value="Mantenimiento">Mantenimiento</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar Vehículo
        </button>

        <a href="/vehiculos" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>

</html>
